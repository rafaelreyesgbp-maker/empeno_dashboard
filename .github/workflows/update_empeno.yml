name: Update Empeno Dashboard

on:
  schedule:
    # Lun–Vie cada hora de 8am–4pm MX (Yucatán UTC-6) → 14–22 UTC
    - cron: '0 14,15,16,17,18,19,20,21,22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests xlrd

      - name: Run updater
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: python update_empeno.py

      - name: Commit updated HTML
        uses: EndBug/add-and-commit@v9
        with:
          add: 'index.html'
          message: 'Auto-update: Casas de Empeno dashboard [skip ci]'
          default_author: github_actions
